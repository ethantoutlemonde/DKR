server {
    listen 80;
    server_name localhost;

    # Servir les fichiers statiques du frontend
    root /usr/share/nginx/html;
    index index.html;

    # Proxy vers auth-service
    location /api/auth/ {
        proxy_pass http://auth-service:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy vers product-service
    location /api/products/ {
        proxy_pass http://product-service:3000/api/products/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy vers product-service (panier)
    location /api/cart/ {
        proxy_pass http://product-service:3000/api/cart/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy vers order-service
    location /api/orders/ {
        proxy_pass http://order-service:3002/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA : toutes les autres routes renvoient vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
